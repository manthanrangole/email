spring:
  application:
    name: job-application-mailer

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dummy@gmail.com}
    password: ${MAIL_PASSWORD:dummypassword}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

app:
  cv-path: classpath:cv/ResumeManthan.pdf
  email:
    subject: "Application for Java Backend Developer Position"
    sender-name: "Manthan Rangole"
    sender-email: ${MAIL_USERNAME:dummy@gmail.com}
    delay-between-emails-ms: 1000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
